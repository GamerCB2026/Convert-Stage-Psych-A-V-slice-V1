<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Stage V-Slice | GamerCB</title> 
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #060608; 
            --card: rgba(20, 20, 27, 0.65); 
            --text: #ffffff; 
            --text-muted: #8a8a98;
            --neon-cyan: #00f2ff; 
            --neon-purple: #9d00ff;
            --neon-green: #00ff66;
            --border: rgba(255, 255, 255, 0.07);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.12) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text); 
            padding: 20px 15px; 
            margin: 0; 
            min-height: 100vh;
        }

        /* Contenedor estilo Glassmorphism */
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: var(--card); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 30px rgba(157, 0, 255, 0.05); 
        }

        /* Título GOAT con degradado neón */
        h1 { 
            text-align: center; 
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            filter: drop-shadow(0 2px 8px rgba(0, 242, 255, 0.3));
        }

        .version {
            text-align: center;
            font-size: 0.85rem;
            color: var(--neon-cyan);
            font-family: monospace;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Zona de subida futurista */
        .upload-zone { 
            border: 2px dashed rgba(0, 242, 255, 0.25); 
            padding: 35px 20px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 25px; 
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }
        
        .upload-zone:hover { 
            border-color: var(--neon-cyan); 
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            transform: translateY(-2px);
        }

        .upload-zone strong {
            display: block;
            font-size: 1.15rem;
            color: #fff;
            margin-bottom: 8px;
        }

        #status {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Grupo de botones principales */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        
        @media (min-width: 650px) { 
            .btn-group { flex-direction: row; } 
        }

        button { 
            flex: 1; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer; 
            transition: all 0.3s ease; 
        }

        /* Botones de conversión estilo Cyber */
        .btn-main { 
            background: #111; 
            color: var(--neon-cyan); 
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: inset 0 0 8px rgba(0, 242, 255, 0.05);
        }
        
        .btn-main:hover { 
            background: var(--neon-cyan); 
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transform: translateY(-1px);
        }

        /* Botón exclusivo iPhone resaltado en Morado */
        .btn-apple {
            background: #111;
            color: var(--neon-purple);
            border: 1px solid rgba(157, 0, 255, 0.4);
        }

        .btn-apple:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
            transform: translateY(-1px);
        }

        /* Textarea terminal hacker */
        .textarea-container {
            position: relative;
            margin-bottom: 25px;
        }

        textarea { 
            width: 100%; 
            height: 380px; 
            background: rgba(5, 5, 5, 0.85); 
            color: var(--neon-green); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 18px; 
            font-family: 'Consolas', 'Fira Code', monospace; 
            font-size: 0.9rem;
            box-sizing: border-box; 
            resize: none; 
            outline: none;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
        }

        textarea::placeholder {
            color: rgba(0, 255, 102, 0.3);
        }

        /* Grupo de acciones abajo */
        .action-group { 
            display: flex; 
            gap: 12px; 
        }

        .btn-sec { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-sec:hover { 
            background: rgba(255, 255, 255, 0.15); 
        }

        .btn-download { 
            background: rgba(0, 255, 102, 0.1); 
            color: var(--neon-green); 
            border: 1px solid rgba(0, 255, 102, 0.4);
        }
        
        .btn-download:hover { 
            background: var(--neon-green); 
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        button:active { 
            transform: scale(0.97) !important; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Convert Stage V-Slice</h1>
    <div class="version">Version 1.0.1 GOAT</div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <strong>Seleccionar Archivos de Psych Engine</strong>
        <p id="status">Arrastra o sube el .json y .lua (o dos .json para iPhone)</p>
        <input type="file" id="fileInput" multiple hidden accept=".json,.lua,text/plain,text/x-lua,application/json">
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="convert('json')">1. SOLO .JSON</button>
        <button class="btn-main" onclick="convert('lua')">2. .JSON + .LUA</button>
        <button class="btn-main btn-apple" onclick="convert('iphone')">3. .JSON + .JSON (iOS)</button>
    </div>

    <div class="textarea-container">
        <textarea id="output" readonly placeholder="// El código V-Slice convertido aparecerá aquí de una..."></textarea>
    </div>

    <div class="action-group">
        <button class="btn-sec" onclick="copyCode()">Copiar código</button>
        <button class="btn-download" onclick="downloadJson()">Descargar .json</button>
    </div>
</div>

<script>
    let rawData = { json: null, lua: "", fileName: "Stage" };

    document.getElementById('fileInput').onchange = function(e) {
        let filesProcessed = 0;
        let totalFiles = e.target.files.length;

        if(totalFiles === 0) return;

        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let content = ev.target.result;
                
                if (file.name.endsWith('.lua')) {
                    rawData.lua = content;
                } 
                else if (file.name.endsWith('.json')) {
                    if (content.includes("makeLuaSprite") || content.includes("makeAnimatedLuaSprite")) {
                        rawData.lua = content; 
                    } else {
                        try {
                            rawData.json = JSON.parse(content);
                            rawData.fileName = file.name.replace('.json', '');
                        } catch(err) {
                            rawData.lua = content;
                        }
                    }
                }

                filesProcessed++;
                if (filesProcessed === totalFiles) {
                    document.getElementById('status').innerHTML = "✨ <span style='color: var(--neon-green)'>Archivos cargados correctamente de una.</span>";
                }
            };
            reader.readAsText(file);
        }
    };

    function convert(mode) {
        if (!rawData.json) return alert("Papi, carga el archivo .json principal primero.");
        if ((mode === 'lua' || mode === 'iphone') && !rawData.lua) {
            return alert("Falta el segundo archivo (.lua o el .json renombrado de iPhone). Selecciónalos juntos.");
        }

        const p = rawData.json;

        let vSlice = {
            "version": "1.0.2",
            "name": rawData.fileName,
            "props": [],
            "characters": {
                "bf": { "alpha": 1, "angle": 0, "cameraOffsets": p.camera_boyfriend || [0, 0], "position": p.boyfriend || [0,0], "scale": 1, "scroll": [1, 1], "zIndex": 300 },
                "dad": { "alpha": 1, "angle": 0, "cameraOffsets": p.camera_opponent || [0, 0], "position": p.opponent || [0,0], "scale": 1, "scroll": [1, 1], "zIndex": 200 },
                "gf": { "alpha": 1, "angle": 0, "cameraOffsets": p.camera_girlfriend || [0, 0], "position": p.girlfriend || [0,0], "scale": 1, "scroll": [1, 1], "zIndex": 100 }
            },
            "cameraZoom": p.defaultZoom || p.defaultCamZoom || 0.8,
            "directory": "shared"
        };

        if (p.objects) {
            p.objects.forEach((obj, i) => {
                if (obj.type === "sprite" || obj.type === "animatedSprite") {
                    let newProp = createProp(obj.name, obj.image, obj.x, obj.y, obj.scale?.[0] || 1, obj.scroll || [1,1], i * 10);
                    
                    if (obj.type === "animatedSprite" && obj.animations) {
                        newProp.animType = "sparrow";
                        obj.animations.forEach(anim => {
                            newProp.animations.push({
                                "assetPath": null, "flipX": false, "flipY": false,
                                "frameIndices": anim.indices || [], "frameRate": anim.fps || 24,
                                "looped": anim.loop || false, "name": anim.anim,
                                "offsets": anim.offsets || [0, 0], "prefix": anim.name
                            });
                        });
                        newProp.startingAnimation = obj.firstAnimation || "";
                    }
                    vSlice.props.push(newProp);
                }
            });
        }

        if ((mode === 'lua' || mode === 'iphone') && rawData.lua) {
            const lines = rawData.lua.split('\n');
            let tempProps = {};
            lines.forEach((line, i) => {
                let match = line.match(/make(?:Animated)?LuaSprite\s*\(\s*['"](.*?)['"]\s*,\s*['"](.*?)['"]\s*,\s*(-?\d+)\s*,\s*(-?\d+)\s*\)/);
                if (match) {
                    tempProps[match[1]] = createProp(match[1], match[2], parseInt(match[3]), parseInt(match[4]), 1, [1,1], 500 + i);
                    if (line.includes("Animated")) tempProps[match[1]].animType = "sparrow";
                }
                let scaleMatch = line.match(/scaleObject\s*\(\s*['"](.*?)['"]\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*\)/);
                if (scaleMatch && tempProps[scaleMatch[1]]) tempProps[scaleMatch[1]].scale = parseFloat(scaleMatch[2]);
                
                let animMatch = line.match(/addAnimationByPrefix\s*\(\s*['"](.*?)['"]\s*,\s*['"](.*?)['"]\s*,\s*['"](.*?)['"]\s*,\s*(\d+)\s*,\s*(true|false)\s*\)/);
                if (animMatch && tempProps[animMatch[1]]) {
                    tempProps[animMatch[1]].animations.push({
                        "assetPath": null, "flipX": false, "flipY": false, "frameIndices": [],
                        "frameRate": parseInt(animMatch[4]), "looped": animMatch[5] === "true",
                        "name": animMatch[2], "offsets": [0, 0], "prefix": animMatch[3]
                    });
                    tempProps[animMatch[1]].startingAnimation = animMatch[2];
                }
            });
            Object.values(tempProps).forEach(p => vSlice.props.push(p));
        }
        document.getElementById('output').value = JSON.stringify(vSlice, null, 2);
    }

    function createProp(name, asset, x, y, scale, scroll, z) {
        return { "alpha": 1, "angle": 0, "animType": "none", "animations": [], "assetPath": asset, "atlasSettings": null, "blend": "", "color": "#FFFFFF", "danceEvery": 0, "flipX": false, "flipY": false, "isPixel": false, "name": name, "position": [x, y], "scale": scale, "scroll": scroll, "startingAnimation": "", "zIndex": z };
    }

    function copyCode() {
        const text = document.getElementById('output');
        if(!text.value) return alert("No hay nada que copiar todavía.");
        text.select();
        text.setSelectionRange(0, 99999); 
        document.execCommand('copy');
        alert("¡Código copiado al portapapeles! Listo para pegar.");
    }

    function downloadJson() {
        const content = document.getElementById('output').value;
        if (!content) return alert("Primero debes realizar la conversión, crack.");
        const blob = new Blob([content], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${rawData.fileName}-convertS.json`;
        a.click();
    }
</script>

</body>
</html>
